{% extends "layout.html" %}
{% block content %}
<div class="col-md-6 col-lg-5">
  <div class="card p-5 bg-white" style="min-width:400px; min-height:400px;">
    <h2 class="text-center mb-4 text-primary">
      <i class="fa-solid fa-right-to-bracket"></i> Teacher Login
    </h2>
    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="mb-4">
        <label class="form-label"><i class="fa-solid fa-envelope"></i> Email</label>
        <input type="email" class="form-control form-control-lg" name="email" placeholder="Enter your email" required>
      </div>
      <div class="mb-4">
        <label class="form-label"><i class="fa-solid fa-lock"></i> Password</label>
        <input type="password" class="form-control form-control-lg" name="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-100">
        <i class="fa-solid fa-sign-in-alt"></i> Login
      </button>
    </form>
  </div>
</div>
{% endblock %}
